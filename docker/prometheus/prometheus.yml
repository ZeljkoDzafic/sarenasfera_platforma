global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "frontend"
    metrics_path: /health
    static_configs:
      - targets: ["frontend:3000"]

  - job_name: "api"
    metrics_path: /health
    static_configs:
      - targets: ["api:8000"]

  - job_name: "kong"
    metrics_path: /
    static_configs:
      - targets: ["kong:8000"]
