name: sarenasfera-platforma
region: fra
domains:
  - domain: platforma.sarenasfera.com
    type: PRIMARY
    wildcard: false
    zone: sarenasfera.com
services:
  # Frontend Service
  - name: frontend
    github:
      repo: sarenasfera/platforma
      branch: main
      deploy_on_push: true
    build_command: |
      cd frontend && \
      npm ci && \
      npm run build
    run_command: |
      cd frontend && \
      npx nuxi preview --host 0.0.0.0 --port 3000
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: professional-xs
    http_port: 3000
    health_check:
      http_path: /
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: production
      - key: NUXT_PUBLIC_SUPABASE_URL
        scope: RUN_TIME
        value: ${SUPABASE_URL}
      - key: NUXT_PUBLIC_SUPABASE_ANON_KEY
        scope: RUN_TIME
        value: ${SUPABASE_ANON_KEY}
      - key: NUXT_PUBLIC_SITE_URL
        scope: RUN_TIME
        value: https://platforma.sarenasfera.com

  # API Service
  - name: api
    github:
      repo: sarenasfera/platforma
      branch: main
      deploy_on_push: true
    build_command: |
      cd api && \
      pip install -r requirements.txt
    run_command: |
      cd api && \
      uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment_slug: python
    instance_count: 1
    instance_size_slug: professional-xs
    http_port: 8000
    health_check:
      http_path: /health
      initial_delay_seconds: 15
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    routes:
      - path: /api
    envs:
      - key: ENVIRONMENT
        value: production
      - key: SUPABASE_URL
        scope: RUN_TIME
        value: ${SUPABASE_INTERNAL_URL}
      - key: SUPABASE_SERVICE_KEY
        scope: RUN_TIME
        value: ${SUPABASE_SERVICE_KEY}
      - key: JWT_SECRET
        scope: RUN_TIME
        value: ${JWT_SECRET}

# Managed Database (PostgreSQL)
databases:
  - engine: PG
    name: sarenasfera-db
    num_nodes: 1
    size: db-s-dev-database
    db_name: sarenasfera
    db_user: sarenasfera
    production: true

# Static Sites (for assets)
static_sites:
  - name: assets
    github:
      repo: sarenasfera/platforma
      branch: main
    build_command: echo "No build needed"
    output_dir: frontend/public
    routes:
      - path: /assets

# Workers (for background jobs)
workers:
  - name: cron-worker
    github:
      repo: sarenasfera/platforma
      branch: main
    build_command: |
      cd api && \
      pip install -r requirements.txt
    run_command: |
      cd api && \
      python -m apscheduler
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: SUPABASE_URL
        scope: RUN_TIME
        value: ${SUPABASE_INTERNAL_URL}
      - key: SUPABASE_SERVICE_KEY
        scope: RUN_TIME
        value: ${SUPABASE_SERVICE_KEY}

# Ingress configuration
ingress:
  rules:
    - component:
        name: frontend
      match:
        path:
          prefix: /
    - component:
        name: api
      match:
        path:
          prefix: /api
