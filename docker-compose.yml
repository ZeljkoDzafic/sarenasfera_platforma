# Sarena Sfera - Local Development
# Usage: docker compose up -d
# Studio: http://localhost:3001
# API Gateway: http://localhost:54321
# Python API: http://localhost:8080
# Frontend: run `npm run dev` in frontend/ (port 3000)

services:
  # ─── PostgreSQL ───────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: sarena-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./.generated/local-db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres && psql -U postgres -d postgres -tAc \"SELECT 1 FROM pg_tables WHERE schemaname = 'public' AND tablename = 'locations'\" | grep -q 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Supabase Auth (GoTrue) ──────────────────────────
  auth:
    image: supabase/gotrue:v2.158.1
    container_name: sarena-auth
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9999:9999"
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://127.0.0.1:54321
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres?sslmode=disable
      GOTRUE_DB_NAMESPACE: auth
      GOTRUE_SITE_URL: http://127.0.0.1:3005
      GOTRUE_URI_ALLOW_LIST: ""
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_HOST: mailpit
      GOTRUE_SMTP_PORT: 1025
      GOTRUE_SMTP_ADMIN_EMAIL: noreply@sarenasfera.com
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify

  # ─── PostgREST (Auto API) ───────────────────────────
  rest:
    image: postgrest/postgrest:v12.2.3
    container_name: sarena-rest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3100:3000"
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_DB_USE_LEGACY_GUCS: "false"

  # ─── Supabase Storage ───────────────────────────────
  storage:
    image: supabase/storage-api:v1.11.13
    container_name: sarena-storage
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      ANON_KEY: ${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlhdCI6MTY0MDk5NTIwMCwiZXhwIjoxNzk4NzYxNjAwfQ.placeholder}
      SERVICE_KEY: ${SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic2FyZW5hc2ZlcmEtbG9jYWwiLCJpYXQiOjE3MDAwMDAwMDAsImV4cCI6MjA5OTk5OTk5OX0.aek88IZjaoZGK1K_KnmW6Kr12FHVi34xK_uJfRo7FLE}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      FILE_SIZE_LIMIT: 52428800
      POSTGREST_URL: http://rest:3000
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
    volumes:
      - storage_data:/var/lib/storage

  # ─── Supabase Studio (Admin UI) ─────────────────────
  studio:
    image: supabase/studio:20241202-71e5240
    container_name: sarena-studio
    restart: unless-stopped
    ports:
      - "3001:3000"
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://' + require('os').hostname() + ':3000/api/profile').then((r) => { if (r.status !== 200) throw new Error(r.status) })"
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DEFAULT_ORGANIZATION_NAME: "Sarena Sfera"
      DEFAULT_PROJECT_NAME: "Sarena Sfera Dev"
      SUPABASE_URL: http://localhost:54321
      SUPABASE_PUBLIC_URL: http://localhost:54321
      SUPABASE_ANON_KEY: ${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InNhcmVuYXNmZXJhLWxvY2FsIiwiaWF0IjoxNzAwMDAwMDAwLCJleHAiOjIwOTk5OTk5OTl9.WpIjNCEGjlnYVuXX1db8MyAZPCb5Pg4m-1BFa1x6VGU}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic2FyZW5hc2ZlcmEtbG9jYWwiLCJpYXQiOjE3MDAwMDAwMDAsImV4cCI6MjA5OTk5OTk5OX0.aek88IZjaoZGK1K_KnmW6Kr12FHVi34xK_uJfRo7FLE}
    depends_on:
      - meta

  # ─── Supabase Meta (for Studio) ─────────────────────
  meta:
    image: supabase/postgres-meta:v0.84.2
    container_name: sarena-meta
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

  # ─── Kong API Gateway ───────────────────────────────
  kong:
    image: kong:3.8
    container_name: sarena-kong
    restart: unless-stopped
    ports:
      - "54321:8000"
      - "54322:8443"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - ./supabase/kong.yml:/var/lib/kong/kong.yml:ro
    depends_on:
      - auth
      - rest
      - storage

  # ─── Mailpit (Local Email Testing) ──────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: sarena-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP

  # ─── Python API (FastAPI) ───────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: sarena-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InNhcmVuYXNmZXJhLWxvY2FsIiwiaWF0IjoxNzAwMDAwMDAwLCJleHAiOjIwOTk5OTk5OTl9.WpIjNCEGjlnYVuXX1db8MyAZPCb5Pg4m-1BFa1x6VGU}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic2FyZW5hc2ZlcmEtbG9jYWwiLCJpYXQiOjE3MDAwMDAwMDAsImV4cCI6MjA5OTk5OTk5OX0.aek88IZjaoZGK1K_KnmW6Kr12FHVi34xK_uJfRo7FLE}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
    volumes:
      - ./api:/app
    depends_on:
      db:
        condition: service_healthy

  db-post-init:
    image: postgres:15-alpine
    container_name: sarena-db-post-init
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./.generated/local-db-post-init:/post-init:ro
    command:
      - /bin/sh
      - -ec
      - |
        if [ -z "$(ls -A /post-init 2>/dev/null)" ]; then
          exit 0
        fi

        until psql "postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres" -tAc \
          "SELECT CASE
             WHEN to_regclass('storage.buckets') IS NOT NULL
              AND to_regclass('storage.objects') IS NOT NULL
              AND to_regprocedure('storage.foldername(text)') IS NOT NULL
             THEN 1
             ELSE 0
           END" | grep -q 1; do
          sleep 1
        done

        for file in /post-init/*.sql; do
          psql "postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres" \
            -v ON_ERROR_STOP=1 \
            -f "$$file"
        done

volumes:
  db_data:
  storage_data:
